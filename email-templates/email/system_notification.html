<!doctype html>
<html lang="en">
  <body style="margin:0;padding:0;background:#f6f6f6;color:#303030;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:32px 16px;background:#f6f6f6;"><tr><td align="center">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border:1px solid #d9d9d9;border-radius:3px;overflow:hidden;">
        <tr><td style="height:6px;background:#fc6d26;font-size:0;line-height:0;">&nbsp;</td></tr>
        <tr><td style="padding:28px 36px 18px;border-bottom:1px solid #e5e5e5;"><strong style="display:block;color:#1f1f1f;font-size:20px;">{{ brand_name }}</strong><span style="display:block;margin-top:6px;color:#6b6b6b;font-size:12px;letter-spacing:0.6px;text-transform:uppercase;">Account notification</span></td></tr>
        <tr><td style="padding:32px 36px;"><h1 style="margin:0 0 18px;color:#1f1f1f;font-size:24px;font-weight:600;line-height:1.3;">{{ title }}</h1><p style="margin:0;font-size:16px;line-height:1.6;">{{ message }}</p></td></tr>
        <tr><td style="padding:20px 36px;background:#fafafa;border-top:1px solid #e5e5e5;color:#6b6b6b;font-size:12px;line-height:1.5;">This is an automated {{ brand_name }} service notification. Please do not reply to this email.</td></tr>
      </table>
    </td></tr></table>
  </body>
</html>
