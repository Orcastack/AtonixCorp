{% extends 'email/base.html' %}
{% block email_preheader %}Order notification{% endblock %}
{% block email_content %}
<h1 style="margin:0 0 16px;color:#0f172a;font-size:30px;line-height:1.2;letter-spacing:-0.03em;">Order {{ order_id }}</h1>
<p style="margin:0 0 22px;font-size:16px;line-height:1.8;color:#334155;">Hi {{ user_name }}, your order for {{ organization_name }} has been updated.</p>
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:separate;border-spacing:0;border:1px solid #d8e2ec;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(15,23,42,0.06);">
	<tr><td style="padding:14px 18px;background:#f8fbff;color:#64748b;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;">Total</td><td style="padding:14px 18px;background:#f8fbff;color:#0f172a;text-align:right;font-size:16px;font-weight:700;">{{ order_total }}</td></tr>
	<tr><td style="padding:14px 18px;border-top:1px solid #e7edf4;color:#64748b;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;">Delivery status</td><td style="padding:14px 18px;border-top:1px solid #e7edf4;color:#0f172a;text-align:right;font-size:15px;font-weight:600;">{{ delivery_status }}</td></tr>
</table>
{% endblock %}
