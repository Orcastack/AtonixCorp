

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: atonixcorp-api
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./api:/app
    env_file:
      - ./api/.env
    environment:
      - DJANGO_SETTINGS_MODULE=atonixcorp_api.settings
      - PYTHONUNBUFFERED=1
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api.atonixcorp.com,atonixcorp.com,www.atonixcorp.com}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://atonixcorp.com,https://www.atonixcorp.com,http://atonixcorp.com,http://www.atonixcorp.com}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://atonixcorp.com,https://www.atonixcorp.com,http://atonixcorp.com,http://www.atonixcorp.com}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://atonixcorp.com}
      - APPROVAL_NOTIFICATION_BASE_URL=${APPROVAL_NOTIFICATION_BASE_URL:-https://atonixcorp.com}
      - AI_ENABLE_EXTERNAL_MODELS=${AI_ENABLE_EXTERNAL_MODELS:-0}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_API_BASE_URL=${ANTHROPIC_API_BASE_URL:-https://api.anthropic.com}
      - CLAUDE_OPUS_MODEL=${CLAUDE_OPUS_MODEL:-claude-opus-4-1}
      - CLAUDE_SONNET_MODEL=${CLAUDE_SONNET_MODEL:-claude-sonnet-4-0}
      - AI_DEFAULT_MAX_TOKENS=${AI_DEFAULT_MAX_TOKENS:-2000}
      - BANKING_TOKEN_ENCRYPTION_KEY=${BANKING_TOKEN_ENCRYPTION_KEY:-local-dev-banking-key-change-me}
      - GOVERNANCE_SIGNING_KEY=${GOVERNANCE_SIGNING_KEY:-}
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID:-}
      - PLAID_CLIENT_SECRET=${PLAID_CLIENT_SECRET:-}
      - PLAID_OAUTH_AUTHORIZE_URL=${PLAID_OAUTH_AUTHORIZE_URL:-}
      - YODLEE_CLIENT_ID=${YODLEE_CLIENT_ID:-}
      - YODLEE_CLIENT_SECRET=${YODLEE_CLIENT_SECRET:-}
      - YODLEE_OAUTH_AUTHORIZE_URL=${YODLEE_OAUTH_AUTHORIZE_URL:-}
      - FINICITY_CLIENT_ID=${FINICITY_CLIENT_ID:-}
      - FINICITY_CLIENT_SECRET=${FINICITY_CLIENT_SECRET:-}
      - FINICITY_OAUTH_AUTHORIZE_URL=${FINICITY_OAUTH_AUTHORIZE_URL:-}
    depends_on: []

  banking-sync:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: atonixcorp-banking-sync
    command: >
      /bin/sh -c "while true; do
      python manage.py sync_banking_integrations;
      sleep ${BANKING_SYNC_INTERVAL_SECONDS:-86400};
      done"
    volumes:
      - ./api:/app
    env_file:
      - ./api/.env
    environment:
      - DJANGO_SETTINGS_MODULE=atonixcorp_api.settings
      - PYTHONUNBUFFERED=1
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      - APPROVAL_NOTIFICATION_BASE_URL=${APPROVAL_NOTIFICATION_BASE_URL:-http://localhost:3000}
      - AI_ENABLE_EXTERNAL_MODELS=${AI_ENABLE_EXTERNAL_MODELS:-0}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_API_BASE_URL=${ANTHROPIC_API_BASE_URL:-https://api.anthropic.com}
      - CLAUDE_OPUS_MODEL=${CLAUDE_OPUS_MODEL:-claude-opus-4-1}
      - CLAUDE_SONNET_MODEL=${CLAUDE_SONNET_MODEL:-claude-sonnet-4-0}
      - AI_DEFAULT_MAX_TOKENS=${AI_DEFAULT_MAX_TOKENS:-2000}
      - BANKING_SYNC_INTERVAL_SECONDS=${BANKING_SYNC_INTERVAL_SECONDS:-86400}
    depends_on:
      - api

  approval-digest:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: atonixcorp-approval-digest
    command: >
      /bin/sh -c "while true; do
      python manage.py send_approval_notification_digest --hours ${APPROVAL_DIGEST_LOOKBACK_HOURS:-24};
      sleep ${APPROVAL_DIGEST_INTERVAL_SECONDS:-86400};
      done"
    volumes:
      - ./api:/app
    env_file:
      - ./api/.env
    environment:
      - DJANGO_SETTINGS_MODULE=atonixcorp_api.settings
      - PYTHONUNBUFFERED=1
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      - APPROVAL_NOTIFICATION_BASE_URL=${APPROVAL_NOTIFICATION_BASE_URL:-http://localhost:3000}
      - AI_ENABLE_EXTERNAL_MODELS=${AI_ENABLE_EXTERNAL_MODELS:-0}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_API_BASE_URL=${ANTHROPIC_API_BASE_URL:-https://api.anthropic.com}
      - CLAUDE_OPUS_MODEL=${CLAUDE_OPUS_MODEL:-claude-opus-4-1}
      - CLAUDE_SONNET_MODEL=${CLAUDE_SONNET_MODEL:-claude-sonnet-4-0}
      - AI_DEFAULT_MAX_TOKENS=${AI_DEFAULT_MAX_TOKENS:-2000}
      - APPROVAL_DIGEST_INTERVAL_SECONDS=${APPROVAL_DIGEST_INTERVAL_SECONDS:-86400}
      - APPROVAL_DIGEST_LOOKBACK_HOURS=${APPROVAL_DIGEST_LOOKBACK_HOURS:-24}
    depends_on:
      - api

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: atonixcorp-app
    command: npm start
    ports:
      - "127.0.0.1:3000:3000"
    stdin_open: true
    tty: true
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      # The app port is loopback-only; public traffic reaches CRA through Apache.
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
    depends_on:
      - api

  apache:
    image: httpd:2.4-alpine
    container_name: atonixcorp-apache
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/apache2/docker/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./deploy/apache2/docker/atonixcorp-vhosts-tls.conf:/usr/local/apache2/conf/extra/atonixcorp-vhosts-tls.conf:ro
      - ./deploy/apache2/docker/atonixcorp-vhosts-http.conf:/usr/local/apache2/conf/extra/atonixcorp-vhosts-http.conf:ro
      - ./deploy/apache2/docker/entrypoint.sh:/usr/local/apache2/conf/extra/entrypoint.sh:ro
      - ${APACHE_CERTS_DIR:-/etc/letsencrypt}:/usr/local/apache2/conf/letsencrypt:ro
    command: ["/bin/sh", "/usr/local/apache2/conf/extra/entrypoint.sh"]
    depends_on:
      - app
      - api

  db:
    image: postgres:14-alpine
    container_name: atonixcorp-db
    environment:
      - POSTGRES_DB=atonixcorp
      - POSTGRES_USER=atonixcorp
      - POSTGRES_PASSWORD=atonixcorppassword
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
