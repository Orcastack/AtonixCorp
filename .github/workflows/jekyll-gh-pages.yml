name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  workflow_dispatch:
    branches: ["__disabled__"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b3b4c9f5f6f8e5e3e6d4c1a2b7c3d9e2f1

      - name: Setup Pages
        uses: actions/configure-pages@45bfe01c2f7e3a9b6c4d2f1e8a7b9c3f5d1e2a0b

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@b16e0e5f7c3a4d2b9e1f0c7a6b5d4e3f2a1c0b9d
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a7c2d9e8f3b6a4c2d1e7f9b3a5c4d2e1f0

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@c8d5e0f9f5e5a4b3c2d1e7f9b3a5c4d2e1f0a7b6