name: Deploy App To GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b3b4c9f5f6f8e5e3e6d4c1a2b7c3d9e2f1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe01c2f7e3a9b6c4d2f1e8a7b9c3f5d1e2a0b

      - name: Set up Node.js
        uses: actions/setup-node@1830845b2c9e4f7d1a6c3b2f9e8d7c6b5a4f3e2d
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          CI: false
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a7c2d9e8f3b6a4c2d1e7f9b3a5c4d2e1f0
        with:
          path: app/build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@c8d5e0f9f5e5a4b3c2d1e7f9b3a5c4d2e1f0a7b6
