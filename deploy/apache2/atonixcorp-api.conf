# AtonixCorp API reverse proxy.
# Requires: proxy, proxy_http, headers, rewrite, ssl.
# Install as /etc/apache2/sites-available/atonixcorp-api.conf.

<VirtualHost *:80>
    ServerName api.atonixcorp.com
    RewriteEngine On
    RewriteRule ^ https://api.atonixcorp.com%{REQUEST_URI} [R=301,L,NE]
</VirtualHost>

<VirtualHost *:443>
    ServerName api.atonixcorp.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/api.atonixcorp.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.atonixcorp.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 120
    LimitRequestBody 26214400

    ProxyPass / http://127.0.0.1:8000/ connectiontimeout=5 timeout=120
    ProxyPassReverse / http://127.0.0.1:8000/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set X-Forwarded-Port "443"

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "same-origin"

    ErrorLog ${APACHE_LOG_DIR}/atonixcorp-api-error.log
    CustomLog ${APACHE_LOG_DIR}/atonixcorp-api-access.log combined
</VirtualHost>
