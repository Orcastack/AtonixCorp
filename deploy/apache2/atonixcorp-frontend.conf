# AtonixCorp public frontend reverse proxy.
# Requires: proxy, proxy_http, proxy_wstunnel, rewrite, headers, ssl.
# Install as /etc/apache2/sites-available/atonixcorp-frontend.conf.

<VirtualHost *:80>
    ServerName atonixcorp.com
    ServerAlias www.atonixcorp.com
    RewriteEngine On
    RewriteRule ^ https://atonixcorp.com%{REQUEST_URI} [R=301,L,NE]
</VirtualHost>

<VirtualHost *:443>
    ServerName atonixcorp.com
    ServerAlias www.atonixcorp.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/atonixcorp.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/atonixcorp.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 120

    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.atonixcorp\.com$ [NC]
    RewriteRule ^ https://atonixcorp.com%{REQUEST_URI} [R=301,L,NE]

    # Required by the React development container's hot-reload socket.
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3000/$1 [P,L]

    ProxyPass / http://127.0.0.1:3000/ connectiontimeout=5 timeout=120
    ProxyPassReverse / http://127.0.0.1:3000/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set X-Forwarded-Port "443"

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "same-origin"

    ErrorLog ${APACHE_LOG_DIR}/atonixcorp-frontend-error.log
    CustomLog ${APACHE_LOG_DIR}/atonixcorp-frontend-access.log combined
</VirtualHost>
