<VirtualHost *:80>
    ServerName atonixcorp.com
    ServerAlias www.atonixcorp.com
    RewriteEngine On
    RewriteRule ^ https://atonixcorp.com%{REQUEST_URI} [R=301,L,NE]
</VirtualHost>

<VirtualHost *:80>
    ServerName api.atonixcorp.com
    RewriteEngine On
    RewriteRule ^ https://api.atonixcorp.com%{REQUEST_URI} [R=301,L,NE]
</VirtualHost>

<VirtualHost *:443>
    ServerName atonixcorp.com
    ServerAlias www.atonixcorp.com

    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/letsencrypt/live/atonixcorp.com/fullchain.pem
    SSLCertificateKeyFile /usr/local/apache2/conf/letsencrypt/live/atonixcorp.com/privkey.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1

    ProxyRequests Off
    # CRA's development server accepts the Docker service host, not the public domain.
    ProxyPreserveHost Off
    ProxyTimeout 120
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.atonixcorp\.com$ [NC]
    RewriteRule ^ https://atonixcorp.com%{REQUEST_URI} [R=301,L,NE]
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://app:3000/$1 [P,L]
    ProxyPass / http://app:3000/ connectiontimeout=5 timeout=120
    ProxyPassReverse / http://app:3000/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "same-origin"
</VirtualHost>

<VirtualHost *:443>
    ServerName api.atonixcorp.com

    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/letsencrypt/live/api.atonixcorp.com/fullchain.pem
    SSLCertificateKeyFile /usr/local/apache2/conf/letsencrypt/live/api.atonixcorp.com/privkey.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 120
    LimitRequestBody 26214400
    ProxyPass / http://api:8000/ connectiontimeout=5 timeout=120
    ProxyPassReverse / http://api:8000/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "same-origin"
</VirtualHost>
