# Temporary HTTP-only fallback used only while TLS certificates are unavailable.
# The entrypoint replaces this with the TLS vhosts once certificates are mounted.
<VirtualHost *:80>
    ServerName atonixcorp.com
    ServerAlias www.atonixcorp.com

    ProxyRequests Off
    ProxyPreserveHost Off
    ProxyTimeout 120
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.atonixcorp\.com$ [NC]
    RewriteRule ^ http://atonixcorp.com%{REQUEST_URI} [R=301,L,NE]
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://app:3000/$1 [P,L]
    ProxyPass / http://app:3000/ connectiontimeout=5 timeout=120
    ProxyPassReverse / http://app:3000/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "same-origin"
</VirtualHost>

<VirtualHost *:80>
    ServerName api.atonixcorp.com

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 120
    LimitRequestBody 26214400
    ProxyPass / http://api:8000/ connectiontimeout=5 timeout=120
    ProxyPassReverse / http://api:8000/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "same-origin"
</VirtualHost>
