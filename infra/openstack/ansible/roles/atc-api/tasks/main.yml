---
# roles/lgx-api/tasks/main.yml
# Deploys the AtonixCorp API container on each api-group host.

- name: Create service data directory
  ansible.builtin.file:
    path: "{{ atc_data_dir }}"
    state: directory
    owner: "{{ atonixcorp_app_user }}"
    group: "{{ atonixcorp_app_group }}"
    mode: '0750'

- name: Template environment file from Vault secrets
  ansible.builtin.template:
    src: lgx-api.env.j2
    dest: "{{ atc_env_file }}"
    owner: "{{ atonixcorp_app_user }}"
    group: "{{ atonixcorp_app_group }}"
    mode: '0600'
  no_log: true   # Never expose env file contents in Ansible output
  notify: Restart lgx-api container

- name: Pull latest image
  community.docker.docker_image:
    name: "{{ atc_image }}"
    source: pull
    force_source: true

- name: Ensure lgx-api container is running
  community.docker.docker_container:
    name: "lgx-{{ env }}-{{ atc_service }}"
    image: "{{ atc_image }}"
    state: started
    restart_policy: "{{ atc_container_restart_policy }}"
    env_file: "{{ atc_env_file }}"
    ports:
      - "{{ atc_api_port }}:{{ atc_api_port }}"
    volumes:
      - "{{ atc_data_dir }}:/app/data:rw"
    log_driver: journald
    labels:
      system: "atonixcorp"
      env: "{{ env }}"
      service: "{{ atc_service }}"
      change_id: "{{ gerrit_change_id | default('manual') }}"
      image_tag: "{{ image_tag | default('unknown') }}"

- name: Verify health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ atc_api_port }}/health/"
    method: GET
    status_code: 200
    timeout: 10
  retries: 6
  delay: 5
  register: health_check
  until: health_check.status == 200
