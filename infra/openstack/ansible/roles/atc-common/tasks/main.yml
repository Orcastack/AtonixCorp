---
# roles/lgx-common/tasks/main.yml
# Baseline hardening and tooling applied to every AtonixCorp host.

- name: Set timezone to UTC
  community.general.timezone:
    name: "{{ atc_timezone }}"

- name: Install required packages
  ansible.builtin.apt:
    name: "{{ atc_required_packages + atc_security_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create AtonixCorp app user
  ansible.builtin.user:
    name: "{{ atonixcorp_app_user }}"
    group: "{{ atonixcorp_app_group }}"
    system: true
    shell: /bin/false
    home: /opt/atonixcorp
    create_home: true

- name: Create AtonixCorp log directory
  ansible.builtin.file:
    path: "{{ atc_log_dir }}"
    state: directory
    owner: "{{ atonixcorp_app_user }}"
    group: "{{ atonixcorp_app_group }}"
    mode: '0750'

- name: Configure NTP
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf
    mode: '0644'
  notify: Restart timesyncd

- name: Disable password-based SSH authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
    validate: 'sshd -t -f %s'
  notify: Restart sshd

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present
    validate: 'sshd -t -f %s'
  notify: Restart sshd

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    state: started
    enabled: true

- name: Enable fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true

- name: Enable Docker daemon
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add LGX app user to docker group
  ansible.builtin.user:
    name: "{{ atonixcorp_app_user }}"
    groups: docker
    append: true

- name: Configure unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades-atonixcorp
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
    mode: '0644'
