---
# site.yml – Apply baseline configuration to ALL AtonixCorp OpenStack hosts.
# Run this after first provisioning or when base configuration drifts.
#
# Usage:
#   ansible-playbook playbooks/site.yml --inventory inventories/<env>/hosts.yml

- name: Apply AtonixCorp common baseline to all hosts
  hosts: all
  gather_facts: true
  roles:
    - lgx-common

- name: Configure API service hosts (ledger, accounts, risk, reporting)
  hosts: api
  gather_facts: true
  roles:
    - lgx-api

- name: Configure database hosts
  hosts: database
  gather_facts: true
  roles:
    - lgx-db
