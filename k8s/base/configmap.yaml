apiVersion: v1
kind: ConfigMap
metadata:
  name: ledgora-config
data:
  DJANGO_DEBUG: "false"
  DJANGO_SETTINGS_MODULE: finance_api.settings
  DJANGO_ALLOWED_HOSTS: "api.ledgora.local,localhost"
  CORS_ALLOWED_ORIGINS: "https://app.ledgora.local"
  CSRF_TRUSTED_ORIGINS: "https://app.ledgora.local"
  DJANGO_SECURE_SSL_REDIRECT: "true"
  DJANGO_SESSION_COOKIE_SECURE: "true"
  DJANGO_CSRF_COOKIE_SECURE: "true"
  PYTHONUNBUFFERED: "1"
  FRONTEND_BASE_URL: "https://app.ledgora.local"
  APPROVAL_NOTIFICATION_BASE_URL: "https://app.ledgora.local"
  AI_ENABLE_EXTERNAL_MODELS: "0"
  ANTHROPIC_API_BASE_URL: "https://api.anthropic.com"
  CLAUDE_OPUS_MODEL: claude-opus-4-1
  CLAUDE_SONNET_MODEL: claude-sonnet-4-0
  AI_DEFAULT_MAX_TOKENS: "2000"
  BANKING_SYNC_INTERVAL_SECONDS: "86400"
  APPROVAL_DIGEST_INTERVAL_SECONDS: "86400"
  APPROVAL_DIGEST_LOOKBACK_HOURS: "24"
  DEPLOYMENT_ENVIRONMENT: base
  APP_VERSION: latest
