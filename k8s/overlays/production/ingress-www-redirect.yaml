apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atonixcorp-www-redirect
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/permanent-redirect: https://atonixcorp.com$request_uri
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.atonixcorp.com
      secretName: atonixcorp-production-tls
  rules:
    - host: www.atonixcorp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 80